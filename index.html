<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/pwa-192x192.svg" />
    <link rel="apple-touch-icon" href="/pwa-192x192.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f59e0b" />
    <meta name="description" content="A modern task management application with offline support" />

    <!-- Preconnect to API origin for faster first request -->
    <link rel="preconnect" href="http://localhost:5000" />
    <link rel="dns-prefetch" href="http://localhost:5000" />

    <title>TaskFlow</title>

    <!-- Inline critical CSS to eliminate layout shift while JS loads -->
    <style>
      /* Prevent FOUC / CLS: reserve space for the app shell */
      html, body { margin: 0; padding: 0; background: #fff; }
      #root { min-height: 100dvh; }
    </style>
  </head>
  <body class="bg-white">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
